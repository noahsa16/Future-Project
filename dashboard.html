<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burk macht Bock — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,500;1,600&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="/static/css/connections.css">
<link rel="stylesheet" href="/static/css/recording.css">
<link rel="stylesheet" href="/static/css/session-detail.css">
<link rel="stylesheet" href="/static/css/sessions.css">
<link rel="stylesheet" href="/static/css/system.css">
<style>
/* ─── Tokens ─────────────────────────────────────────────────── */
:root {
  --bg:        oklch(0.955 0.016 72);
  --surface:   oklch(0.990 0.007 72);
  --surface2:  oklch(0.975 0.012 72);
  --sidebar:   oklch(0.175 0.025 55);
  --sidebar2:  oklch(0.225 0.030 55);
  --border:    oklch(0.880 0.018 72);
  --border2:   oklch(0.840 0.022 72);
  --text:      oklch(0.185 0.022 58);
  --text2:     oklch(0.465 0.022 58);
  --text3:     oklch(0.650 0.018 58);
  --accent:    oklch(0.595 0.165 43);
  --accent-h:  oklch(0.540 0.175 43);
  --green:     oklch(0.580 0.130 148);
  --red:       oklch(0.575 0.175 24);
  --yellow:    oklch(0.720 0.135 88);
  --mono:      'IBM Plex Mono', monospace;
  --sans:      'IBM Plex Sans', system-ui, sans-serif;
  --radius-xs:   4px;   /* kleine inline tags */
  --radius-sm:   6px;   /* boxes, buttons, inputs, chips */
  --radius-md:   10px;  /* cards, panels */
  --radius-pill: 999px; /* pills, status-badges, bars, timeline */
}
body[data-theme="dark"] {
  --bg:        oklch(0.165 0.018 58);
  --surface:   oklch(0.220 0.020 58);
  --surface2:  oklch(0.270 0.021 58);
  --sidebar:   oklch(0.125 0.020 55);
  --sidebar2:  oklch(0.180 0.025 55);
  --border:    oklch(0.335 0.018 58);
  --border2:   oklch(0.420 0.020 58);
  --text:      oklch(0.925 0.014 78);
  --text2:     oklch(0.735 0.018 78);
  --text3:     oklch(0.585 0.018 78);
  --accent:    oklch(0.690 0.150 48);
  --accent-h:  oklch(0.745 0.150 48);
  --green:     oklch(0.710 0.130 150);
  --red:       oklch(0.680 0.170 24);
  --yellow:    oklch(0.790 0.135 88);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--sans); background: var(--bg); color: var(--text);
  display: flex; flex-direction: column; font-size: 14px;
  /* Tabular Numerals: alle Ziffern gleichbreit → Live-Werte zappeln nicht mehr beim Update */
  font-variant-numeric: tabular-nums;
  font-feature-settings: "tnum" 1;
}

/* ─── Scrollbar ──────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: var(--radius-xs); }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

/* ─── Skeleton Loader: pulsende Box solange noch kein Wert da ist ─── */
@keyframes skel-shimmer {
  0%   { background-position: 100% 0; }
  100% { background-position: -100% 0; }
}
.skel-loading {
  display: inline-block;
  color: transparent !important;
  background: linear-gradient(
    90deg,
    var(--surface2) 0%,
    var(--border) 45%,
    var(--surface2) 90%
  );
  background-size: 220% 100%;
  border-radius: var(--radius-xs);
  animation: skel-shimmer 1.6s linear infinite;
  /* min-width sorgt dafür, dass die Box auch ohne Inhalt sichtbar bleibt */
  min-width: 3.5ch;
  user-select: none;
}

/* ─── Main area (kein Sidebar mehr, alles vertikal) ──────────── */
#main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* ─── Top bar v2: Brand · Tabs · Status ──────────────────────── */
#topbar {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 32px;
  padding: 14px 32px;
  background: var(--surface);
  /* feiner Schatten statt harter Border — wirkt produkt-y */
  box-shadow: 0 1px 0 oklch(0.880 0.018 72 / 0.6);
  flex-shrink: 0;
  position: relative; z-index: 5;
}

/* Wordmark — Plex Mono Italic Bold mit Trail-Slash. */
.brand {
  position: relative;
  display: inline-flex; align-items: baseline; gap: 2px;
  font-family: var(--mono); font-style: italic; font-weight: 600;
  font-size: 19px; letter-spacing: -0.01em; color: var(--text);
  background: none; border: none; cursor: pointer; padding: 0;
  transition: color 0.15s ease, transform 0.08s ease;
  white-space: nowrap;
}
.brand:hover { color: var(--accent); }
.brand:active { transform: translateY(1px); }
.brand-slash {
  font-family: var(--mono); font-style: normal; font-weight: 600;
  color: var(--accent); margin-left: 4px;
}

/* Wordmark-Tooltip: zwei Zeilen Mono-Text in einer Pill, fadet beim
   Hover ein. Ersetzt den nativen browser-title (war stylisch generisch). */
.brand-tooltip {
  position: absolute;
  top: calc(100% + 10px); left: 0;
  display: flex; flex-direction: column; gap: 2px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 14px;
  white-space: nowrap;
  opacity: 0;
  transform: translateY(-4px);
  pointer-events: none;
  transition: opacity 0.2s ease, transform 0.2s ease;
  box-shadow: 0 6px 22px -10px oklch(0.300 0.025 55 / 0.30);
  z-index: 20;
}
.brand:hover .brand-tooltip {
  opacity: 1; transform: translateY(0);
}
.brand-tooltip-line {
  font-family: var(--mono); font-style: normal; font-weight: 500;
  font-size: 11.5px; letter-spacing: 0.02em; color: var(--text);
}
.brand-tooltip-line.muted {
  font-weight: 400; color: var(--text3); font-size: 10.5px;
}

/* Linear-style tabs — kein Background, dünner Underline auf aktivem. */
.tabs {
  display: flex; gap: 6px; align-items: stretch;
  position: relative;
  /* Tabs unten am Topbar-Boden ausrichten, damit Underline auf der Bar sitzt */
  align-self: stretch; padding-top: 4px;
}
.tab {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 0 14px;
  font-family: var(--sans); font-size: 13px; font-weight: 500;
  color: var(--text3); cursor: pointer; user-select: none;
  background: none; border: none;
  position: relative;
  transition: color 0.15s ease, transform 0.08s ease;
}
.tab:hover { color: var(--text); }
.tab:active { transform: translateY(1px); }
.tab.active { color: var(--text); font-weight: 600; }

/* Underline slidet zwischen Tabs — ein einziges Element, das von JS
   zur Position des aktiven Tabs translated wird. Sieht aus wie Linear/Radix. */
.tab-indicator {
  position: absolute;
  bottom: -14px;
  left: 0;
  height: 2px;
  background: var(--text);
  border-radius: var(--radius-pill);
  pointer-events: none;
  opacity: 0;
  /* transform und width werden von JS gesetzt; cubic-bezier ist ein
     mildes "easeInOut" — schnell genug, nicht trödelnd. */
  transition:
    transform 0.32s cubic-bezier(0.4, 0, 0.2, 1),
    width     0.32s cubic-bezier(0.4, 0, 0.2, 1),
    opacity   0.2s  ease;
}
.tab-indicator.ready { opacity: 1; }

.page-title, .page-sub { display: none; }
.pill-row { display: flex; gap: 8px; align-items: center; }
.pill {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 11px; border-radius: var(--radius-pill); font-size: 11.5px;
  font-family: var(--mono); font-weight: 500; border: 1px solid transparent;
  background: var(--surface2); border-color: var(--border);
}
.pill .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); }
.pill.ok .dot { background: var(--green); }
.pill.warn .dot { background: var(--yellow); animation: pulse 1.5s infinite; }
.pill.err .dot { background: var(--red); }

/* ─── Konsolidierter Status-Cluster im Topbar ──────────────── */
.status-cluster {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 5px 14px 5px 10px;
  border-radius: var(--radius-pill);
  background: var(--surface2);
  border: 1px solid var(--border);
  font-family: var(--sans); font-size: 12.5px; color: var(--text);
  cursor: pointer;
  transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
}
.status-cluster:hover {
  background: var(--surface);
  border-color: var(--border2);
}
.status-cluster:active { transform: translateY(1px); }
.status-cluster-dots { display: inline-flex; gap: 5px; }
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--text3);
  transition: background 0.2s ease;
}
.status-dot.ok   { background: var(--green); }
.status-dot.warn { background: var(--yellow); animation: pulse 1.5s infinite; }
.status-dot.err  { background: var(--red); }
.status-cluster-label { font-weight: 600; letter-spacing: -0.005em; }
.status-cluster-meta {
  color: var(--text2); font-family: var(--mono); font-size: 11.5px;
}
.status-cluster-meta:empty { display: none; }

/* Topbar-Right gruppiert Status + Theme-Toggle */
.topbar-right { display: inline-flex; align-items: center; gap: 8px; }

/* Theme-Toggle: kompakter Icon-Button, gleiche Chrome-Sprache wie Status-Cluster */
.theme-toggle {
  width: 32px; height: 32px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: var(--radius-pill);
  background: var(--surface2); border: 1px solid var(--border);
  cursor: pointer; padding: 0;
  color: var(--text2);
  transition: background 0.15s ease, border-color 0.15s ease, transform 0.08s ease, color 0.15s ease;
}
.theme-toggle:hover {
  background: var(--surface);
  border-color: var(--border2);
  color: var(--text);
}
.theme-toggle:active { transform: translateY(1px); }
.theme-toggle-glyph {
  font-family: var(--mono); font-size: 15px; line-height: 1;
  display: inline-block;
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
.theme-toggle:hover .theme-toggle-glyph { transform: rotate(20deg); }

/* ─── Content ────────────────────────────────────────────────── */
#content { flex: 1; overflow-y: auto; padding: 28px 32px; }
#content > .page { max-width: 1400px; margin: 0 auto; }

/* ─── Cards: Hierarchie-System (hero / default / muted) ──────── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-md); padding: 18px 20px; position: relative;
}
.card-title { font-size: 12px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text2); margin-bottom: 14px; }
.card-title span { color: var(--text3); font-weight: 400; text-transform: none; letter-spacing: 0; margin-left: 6px; }

/* Hero: das Live-Recording dominiert die Seite. Mehr Padding, akzent-
   gestreifter Top-Edge der bei aktiver Session "aufleuchtet" → der Eindruck
   "hier passiert gerade was". Nicht-aktiver Zustand ist ruhig zurückhaltend. */
.card-hero {
  padding: 26px 28px;
  overflow: hidden;
}
.card-hero::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 2px; background: var(--border2);
  transition: background 0.3s ease;
}
.card-hero.live::before {
  background: linear-gradient(90deg,
    transparent,
    var(--accent) 20%,
    var(--accent) 80%,
    transparent);
}
.card-hero .card-title { font-size: 13px; }

.live-indicator {
  display: none; align-items: center; gap: 6px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--red); margin-left: 10px; vertical-align: middle;
}
.live-indicator::before {
  content: ''; width: 7px; height: 7px; border-radius: 50%;
  background: var(--red); animation: pulse 1.4s infinite ease-in-out;
}
.card-hero.live .live-indicator { display: inline-flex; }

/* Muted: Device-Cards spielen die zweite Geige. Weicheres Chrome,
   weniger Padding, kleinere Titles — aber nicht ausgegraut. */
.card-muted {
  padding: 14px 16px;
  background: var(--surface);
  border-color: var(--border);
  transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
}
.card-muted:hover {
  transform: translateY(-1px);
  border-color: var(--border2);
  box-shadow: 0 4px 14px -8px oklch(0.300 0.025 55 / 0.20);
}
.card-muted .card-title { font-size: 11px; margin-bottom: 10px; }
.card-muted .device-row { padding: 3px 0; font-size: 11.5px; }

/* ─── Details-Toggle: Sekundär-Metriken ein-/ausklappen ─────── */
.card-details {
  max-height: 0; opacity: 0;
  margin-top: 0;
  padding-top: 0;
  border-top: 1px dashed transparent;
  overflow: hidden;
  transition:
    max-height 0.28s ease,
    opacity 0.18s ease,
    margin-top 0.2s ease,
    padding-top 0.2s ease,
    border-color 0.2s ease;
}
.card.expanded > .card-details {
  /* 600px reicht für unsere kleinen Detail-Blöcke; falls mal mehr,
     einfach hochsetzen — die Animation skaliert nicht visuell, da overflow hidden. */
  max-height: 600px; opacity: 1;
  margin-top: 8px; padding-top: 10px;
  border-top-color: var(--border);
}
.card-details-toggle {
  display: inline-flex; align-items: center; gap: 4px;
  margin-top: 10px; padding: 0;
  background: none; border: none; cursor: pointer;
  font-family: var(--sans); font-size: 11px; font-weight: 500;
  color: var(--text3); letter-spacing: 0.02em;
  transition: color 0.15s ease;
}
.card-details-toggle:hover { color: var(--text); }
.card-details-chevron {
  font-family: var(--mono); font-size: 13px; line-height: 1;
  transition: transform 0.2s ease; display: inline-block;
}
.card.expanded .card-details-chevron { transform: rotate(90deg); }
.card.expanded .card-details-label-show { display: none; }
.card-details-label-hide { display: none; }
.card.expanded .card-details-label-hide { display: inline; }

/* Recording page styles moved to static/css/recording.css */

/* ─── Page-Strip: editorial date + section line oben über allen Pages ─── */
.page-strip {
  max-width: 1400px; margin: 0 auto 18px;
  font-family: var(--mono); font-style: italic;
  font-size: 11.5px; letter-spacing: 0.01em;
  color: var(--text3);
  display: flex; align-items: baseline; gap: 8px;
  /* feines Hairline-Underline → wirkt wie Magazin-Section-Header */
  padding-bottom: 10px;
  border-bottom: 1px dotted oklch(0.700 0.020 60 / 0.35);
}
.page-strip-date { font-weight: 500; color: var(--text2); }
.page-strip-slash {
  color: var(--accent); opacity: 0.65;
  font-style: italic; font-weight: 600;
}
.page-strip-label {
  color: var(--text3); font-style: italic;
  text-transform: lowercase; letter-spacing: 0.02em;
}

/* ─── "/" als Brand-Motiv vor jedem card-title (außer Hero, der hat seine eigene Sprache) ─── */
.card-title { position: relative; }
.card-title::before {
  content: '/';
  display: inline-block;
  margin-right: 8px;
  font-family: var(--mono); font-style: italic; font-weight: 600;
  color: var(--accent); opacity: 0.45;
  /* Akzent darf nicht den uppercase-letter-spacing der card-titles aufzehren */
  letter-spacing: 0;
}
.card-hero .card-title::before { display: none; }
/* Sessions-Page slash rules moved to static/css/sessions.css */

/* Spalten-Marker rec-grid, pen canvas, logs, device cards, responsive tweaks
   moved to static/css/recording.css */

/* Settings and System page styles moved to static/css/system.css */

/* Uptime bar styles moved to static/css/connections.css */

/* ─── Page visibility ───────────────────────────────────────── */
.page { display: none; }
.page.active { display: block; }

/* ─── Notification toast ─────────────────────────────────────── */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--sidebar); color: #fff; padding: 10px 18px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500; z-index: 9999; transition: transform 0.3s ease;
  pointer-events: none; white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ═══════════════════════ MAIN ══════════════════════════════ -->
<main id="main">
  <!-- Top bar: Brand · Tabs · Status -->
  <div id="topbar">
    <button type="button" class="brand" onclick="goHome()">
      <span>Burk macht Bock</span><span class="brand-slash">/</span>
      <span class="brand-tooltip" aria-hidden="true">
        <span class="brand-tooltip-line">ML4SCS · Writing Activity Study</span>
        <span class="brand-tooltip-line muted">Noah Samel · Ben Kriegsmann · Tajuddin Snasni</span>
      </span>
    </button>
    <nav class="tabs" role="tablist">
      <button type="button" class="tab active" data-page="recording"   role="tab">Recording</button>
      <button type="button" class="tab"        data-page="sessions"    role="tab">Sessions</button>
      <button type="button" class="tab"        data-page="connections" role="tab">Connections</button>
      <button type="button" class="tab"        data-page="system"      role="tab">System</button>
      <span class="tab-indicator" id="tabIndicator" aria-hidden="true"></span>
    </nav>
    <div class="topbar-right">
      <button type="button" class="status-cluster" id="statusCluster"
              title="Click for connection details">
        <span class="status-cluster-dots">
          <span class="status-dot" id="clusterDotPen"    aria-label="Pen"></span>
          <span class="status-dot" id="clusterDotWatch"  aria-label="Watch"></span>
          <span class="status-dot" id="clusterDotServer" aria-label="Server"></span>
        </span>
        <span class="status-cluster-label" id="statusClusterLabel">connecting…</span>
        <span class="status-cluster-meta" id="statusClusterMeta"></span>
      </button>
      <button type="button" class="theme-toggle" id="themeToggle"
              onclick="toggleTheme()" aria-label="Toggle theme" title="Toggle light / dark">
        <span class="theme-toggle-glyph" id="themeToggleGlyph">☾</span>
      </button>
    </div>
  </div>

  <!-- Content -->
  <div id="content">

    <!-- Editorial date-strip: italic mono, oben über allen Pages. -->
    <div class="page-strip" id="pageStrip">
      <span class="page-strip-date" id="pageStripDate">–</span>
      <span class="page-strip-slash">/</span>
      <span class="page-strip-label" id="pageStripLabel">–</span>
    </div>

    <!-- ══════════ PAGE: RECORDING ══════════ -->
    <div class="page active" id="page-recording" data-view="recording"></div>

    <!-- ══════════ PAGE: SESSIONS ══════════ -->
    <div class="page" id="page-sessions" data-view="sessions"></div>

    <!-- ══════════ PAGE: SESSION DETAIL ══════════ -->
    <div class="page" id="page-session-detail" data-view="session-detail"></div>

    <!-- ══════════ PAGE: CONNECTIONS ══════════ -->
    <div class="page" id="page-connections" data-view="connections"></div>

    <!-- ══════════ PAGE: SYSTEM ══════════ -->
    <div class="page" id="page-system" data-view="system"></div>

  </div><!-- /content -->
</main>

<div id="toast"></div>

<script type="module" src="/static/dashboard.js?v=20260510-23"></script>
</body>
</html>
